name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release via changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Debug — npm auth + access check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          echo "=== token length / preview ==="
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          echo "NPM_TOKEN starts: ${NPM_TOKEN:0:8}..."
          echo "=== writing ~/.npmrc ==="
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "=== npm whoami ==="
          npm whoami --registry https://registry.npmjs.org/ || echo "whoami FAILED"
          echo "=== npm access list-packages (as me) ==="
          npm access list packages --registry https://registry.npmjs.org/ 2>&1 | head -20 || true
          echo "=== npm org ls whitestag (expect my own orgs) ==="
          npm org ls whitestag --registry https://registry.npmjs.org/ 2>&1 | head -10 || true

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: release"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log in to GHCR
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/whitestag-ai/pii-proxy:latest
            ghcr.io/whitestag-ai/pii-proxy:${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}

      - name: Publish Python package
        if: steps.changesets.outputs.published == 'true'
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
